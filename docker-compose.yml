version: '3.8'

services:
  web:
    build:
      context: .
      target: runtime
    container_name: lead-crm-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:////app/leads.db
    # Overwrite runtime CMD to support live reload during development
    command: sh -c "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
